apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: <YOUR_GITOPS_REPO_URL>   # e.g. https://github.com/yourorg/ammax-deployment.git or your GitLab/Gitea URL
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: ammax

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true