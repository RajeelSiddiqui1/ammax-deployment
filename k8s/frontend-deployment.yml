kind: Deployment
apiVersion: apps/v1

metadata:
 name: frontend-deployment
 namespace: ammax

spec:
 replicas: 1
 selector:
  matchLabels:
   app: frontend

 template: 
  metadata:
   labels:
    app: frontend

  spec: 
    containers: 
    - name: frontend-container
      image: rajeel/ammax-frontend:0c5d8a2
      env:
      - name: VITE_BRAND_NAME
        valueFrom:
          secretKeyRef:
            name: secrets
            key: vite-brand-name

      - name: VITE_API_URL
        valueFrom:
          secretKeyRef:
            name: secrets
            key: vite-api-url

      - name: VITE_IMAGE_URL
        valueFrom:
          secretKeyRef:
            name: secrets
            key: vite-image-url

      ports: 
      - containerPort: 80

      resources:
       requests:
        cpu: "100m"
        memory: "128Mi"

       limits:
        cpu: "200m"
        memory: "256Mi"      


