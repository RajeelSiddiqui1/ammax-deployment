kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: backend-hpa
  namespace: ammax

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment

  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
